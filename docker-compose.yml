services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-posting-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto_posting}
      POSTGRES_USER: ${POSTGRES_USER:-auto_posting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auto_posting}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto-posting-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
